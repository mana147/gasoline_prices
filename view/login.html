<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MPC Fuel Service</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon"> <img src="/logo.png" alt="logo"> </div>
            <h1>MPC Fuel Service</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>

        <form class="login-form" id="loginForm">
            <div id="messageBox" class="message"></div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Nhập tên đăng nhập"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập mật khẩu"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="remember-me">
                <input hidden type="checkbox" id="remember" name="remember">
                <label hidden for="remember">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Đăng nhập
            </button>
        </form>

        <div class="login-footer">
            <!-- <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p> -->
        </div>
    </div>

    <script>
        let API_URL = '/api';
        API_URL = window.API_URL || API_URL;

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                // Verify token is still valid
                verifyToken(token);
            }
        });

        // Verify token
        async function verifyToken(token) {
            try {
                const response = await fetch(`${API_URL}/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    // Token valid, redirect to main page
                    window.location.href = '/';
                } else {
                    // Token invalid, remove it
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            } catch (error) {
                console.error('Token verification failed:', error);
            }
        }

        // Show message
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;
            messageBox.className = `message ${type}`;
        }

        // Hide message
        function hideMessage() {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = 'message';
        }

        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btnLogin = document.getElementById('btnLogin');

            if (!username || !password) {
                showMessage('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            // Disable button and show loading
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loading"></span>Đang đăng nhập...';
            hideMessage();

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    // Save token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (remember) {
                        localStorage.setItem('rememberLogin', 'true');
                    }

                    // Redirect after 1 second
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);

                } else {
                    showMessage(data.message || 'Đăng nhập thất bại!', 'error');
                }

            } catch (error) {
                console.error('Login error:', error);
                showMessage('Lỗi kết nối server. Vui lòng thử lại!', 'error');

            } finally {
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Đăng nhập';
            }
        });

        // Allow Enter key to submit
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
        
    </script>
</body>
</html>
